name: Update Activity

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-activity:
    runs-on: ubuntu-latest
    name: Update GitHub Activity in README
    steps:
      - uses: actions/checkout@v3
      - uses: gautamkrishnar/user-activity-workflow@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
