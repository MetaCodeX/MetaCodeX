<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="100%" height="100%">
  <style>
    @keyframes typing {
      from { width: 0 }
      to { width: 390px }
    }
    @keyframes blink {
      from, to { border-color: transparent }
      50% { border-color: #ffd700 }
    }
    .title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 58px;
      fill: #ffd700;
      font-weight: 800;
      letter-spacing: 6px;
      text-anchor: middle;
    }
    .subtitle-container {
      overflow: hidden;
      border-right: 3px solid #ffd700;
      width: 0;
      animation: typing 3.5s steps(30, end) 0.5s forwards, blink .75s step-end infinite;
    }
    .subtitle-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 18px;
      fill: #a0aec0;
      letter-spacing: 2px;
      white-space: nowrap;
    }
  </style>
  <rect width="100%" height="100%" fill="none"/>
  
  <!-- Subtle background glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Center-aligned title -->
  <text x="300" y="55" class="title" text-anchor="middle">META CODEX</text>
  
  <!-- Center-aligned animated subtitle -->
  <svg x="105" y="75" width="390" height="35" class="subtitle-container">
    <text x="0" y="25" class="subtitle-text">FULL STACK &amp; AI AGENT ENGINEER</text>
  </svg>
</svg>
