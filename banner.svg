<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <style>
    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }
    @keyframes blink {
      from, to { border-color: transparent }
      50% { border-color: #ffd700 }
    }
    .title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 48px;
      fill: #ffd700;
      font-weight: 800;
      letter-spacing: 6px;
    }
    .subtitle {
      font-family: 'Courier New', Courier, monospace;
      font-size: 18px;
      fill: #a0aec0;
      letter-spacing: 3px;
      white-space: nowrap;
      overflow: hidden;
      border-right: 3px solid #ffd700;
      width: 0;
      animation: typing 3.5s steps(40, end) 0.5s forwards, blink .75s step-end infinite;
    }
  </style>
  <rect width="100%" height="100%" fill="none"/>
  
  <!-- Subtle background glow -->
  <defs>
    <radialGradient id="glow" cx="20%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#glow)"/>

  <!-- Logo and title -->
  <g transform="translate(50, 90)">
    <text x="0" y="0" class="title">META CODEX</text>
  </g>
  
  <!-- Animated subtitle -->
  <g transform="translate(50, 135)">
    <!-- Wrapper to contain typing animation width -->
    <svg width="600" height="40">
      <text x="0" y="20" class="subtitle">FULL STACK &amp; AI AGENT ENGINEER</text>
    </svg>
  </g>
</svg>
